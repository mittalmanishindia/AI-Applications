<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'%3E%3Cpolyline points='9 11 12 14 22 4'%3E%3C/polyline%3E%3Cpath d='M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'%3E%3C/path%3E%3C/svg%3E" alt="Todo Icon" class="title-icon">
                My Todo List
            </h1>
            
            <div class="input-section">
                <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="200">
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>
            
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            
            <ul id="taskList" class="task-list"></ul>
            
            <div class="footer">
                <span id="taskCount">0 tasks remaining</span>
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
