<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="search-header">
            <h1 class="logo">Lumina</h1>
            <div class="search-bar-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="Search the web..." autocomplete="off">
                <button id="search-btn">Search</button>
            </div>
        </header>
        
        <main id="results-container" class="results-container">
            <!-- Results will be injected here -->
            <div class="placeholder-text">
                <p>Type something to start exploring.</p>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
